<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#6366f1"/>
  
  <!-- Link icon (simplified chain link) -->
  <g fill="white">
    <!-- Left circle -->
    <circle cx="10" cy="16" r="4" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Right circle -->
    <circle cx="22" cy="16" r="4" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Connecting line -->
    <line x1="14" y1="16" x2="18" y2="16" stroke="white" stroke-width="1.5"/>
    <!-- Arrow on right -->
    <polyline points="20,14 22,16 20,18" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
